version: "3.9"

# Note: run ./scripts/pre-deploy-clean.sh before `docker compose up` on a new server
# to remove legacy postgres/mysql volumes and ensure a clean MySQL initialization.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_DATABASE: rovena
      MYSQL_USER: rovena
      MYSQL_PASSWORD: rovena
      MYSQL_ROOT_PASSWORD: rovena_root
    volumes:
      - postgres-data:/var/lib/mysql
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PROXY_CONFIG_PATH: ${PROXY_CONFIG_PATH:-/app/3proxy.cfg}
      PROXY_BASE_PORT: ${PROXY_BASE_PORT:-10000}
      PROXY_RELOAD_CMD: ${PROXY_RELOAD_CMD:-}
    volumes:
      - 3proxy-cfg:/app/3proxy.cfg
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      com.prometheus.scrape: "true"
      com.prometheus.port: "8020"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PROXY_CONFIG_PATH: ${PROXY_CONFIG_PATH:-/app/3proxy.cfg}
      PROXY_BASE_PORT: ${PROXY_BASE_PORT:-10000}
      PROXY_RELOAD_CMD: ${PROXY_RELOAD_CMD:-}
    volumes:
      - 3proxy-cfg:/app/3proxy.cfg
    command: celery -A app.workers worker --loglevel=info
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

  proxy:
    image: vimagick/3proxy:latest
    container_name: 3proxy
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "10000-11000:10000-11000"
    volumes:
      - 3proxy-cfg:/etc/3proxy/3proxy.cfg
    command: ["/usr/local/bin/3proxy", "/etc/3proxy/3proxy.cfg"]
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "sh", "-c", "test -s /etc/3proxy/3proxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8020/api/v1}
    restart: unless-stopped
    logging: *default-logging
    environment:
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
    labels:
      com.prometheus.scrape: "true"
      com.prometheus.port: "80"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_rules.yml:/etc/prometheus/prometheus_rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
      - nginx
      - proxy

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    restart: unless-stopped
    logging: *default-logging
    command:
      - -nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml

  cron:
    image: alpine/cron:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_DATABASE: rovena
      MYSQL_USER: rovena
      MYSQL_PASSWORD: rovena
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./crontab.txt:/etc/crontabs/root:ro
      - backups:/backups
    command: sh -c "apk add --no-cache mysql-client redis && crond -f -l 2"
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "crond", "-l", "2"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  3proxy-cfg:
  prometheus-data:
  grafana-data:
  backups:
