# Note: run ./scripts/pre-deploy-clean.sh before `docker compose up` on a new server
# to remove legacy postgres/mysql volumes and ensure a clean MySQL initialization.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
x-3proxy-command: &proxy-command ["/usr/local/bin/3proxy", "/etc/3proxy/3proxy.cfg"]
x-3proxy-healthcheck: &proxy-healthcheck ["CMD", "sh", "-lc", "test -s /etc/3proxy/3proxy.cfg && pgrep 3proxy >/dev/null"]

services:
  traefik:
    image: traefik:v3.6.1
    restart: unless-stopped
    logging: *default-logging
    networks:
      - public
      - app
      - infra
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=tcp://docker-socket-proxy:2375
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # ── Timeouts: prevent indefinite hangs when backend is slow ──
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=60s
      - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=60s
      - --serversTransport.forwardingTimeouts.dialTimeout=10s
      - --serversTransport.forwardingTimeouts.responseHeaderTimeout=30s
      # ── Access logs: JSON for structured debugging ──
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.fields.headers.defaultmode=drop
      - --accesslog.fields.headers.names.User-Agent=keep
      - --accesslog.fields.headers.names.Content-Type=keep
      - --accesslog.fields.headers.names.X-Request-ID=keep
      # ── TLS / ACME ──
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${LE_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
    depends_on:
      docker-socket-proxy:
        condition: service_started

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    restart: unless-stopped
    logging: *default-logging
    networks:
      - infra
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      INFO: "1"
      NETWORKS: "1"
      SERVICES: "1"
      TASKS: "1"
      VERSION: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: mysql:8.4
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app
      - data
      - egress
    init: true
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PROXY_CONFIG_PATH: ${PROXY_CONFIG_PATH:-/app/3proxy-cfg/3proxy.cfg}
      PROXY_BASE_PORT: ${PROXY_BASE_PORT:-10000}
      PROXY_RELOAD_CMD: ${PROXY_RELOAD_CMD:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      WAIT_FOR_DEPS: ${WAIT_FOR_DEPS:-1}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-1}
      WAIT_FOR_REDIS: ${WAIT_FOR_REDIS:-1}
      WAIT_MAX_RETRIES: ${WAIT_MAX_RETRIES:-30}
      WAIT_BACKOFF_BASE: ${WAIT_BACKOFF_BASE:-2}
      WAIT_BACKOFF_MAX: ${WAIT_BACKOFF_MAX:-20}
      MIGRATION_MAX_RETRIES: ${MIGRATION_MAX_RETRIES:-10}
      MIGRATION_BACKOFF_BASE: ${MIGRATION_BACKOFF_BASE:-2}
      MIGRATION_BACKOFF_MAX: ${MIGRATION_BACKOFF_MAX:-30}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      PRODUCTION: "true"
      ENVIRONMENT: production
      WEB_BASE_URL: "https://${DOMAIN:-kass.freestorms.top}"
      CORS_ORIGINS: '["https://${DOMAIN:-kass.freestorms.top}"]'
      DEV_ALLOW_LOCALHOST: "false"
      UVICORN_HOST: ${UVICORN_HOST:-0.0.0.0}
      UVICORN_PORT: ${UVICORN_PORT:-8000}
      BACKEND_HEALTH_URL: ${BACKEND_HEALTH_URL:-http://localhost:8000/api/v1/health}
    volumes:
      - 3proxy-cfg:/app/3proxy-cfg
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      com.prometheus.scrape: "true"
      com.prometheus.port: "8000"
      traefik.enable: "true"
      traefik.docker.network: rovena_app
      # основной API
      traefik.http.routers.kass-api.rule: "Host(`kass.freestorms.top`) && (PathPrefix(`/api/v1/`) || Path(`/api/v1`))"
      traefik.http.routers.kass-api.entrypoints: websecure
      traefik.http.routers.kass-api.priority: "20"
      traefik.http.routers.kass-api.service: kass-api
      traefik.http.routers.kass-api.tls: "true"
      traefik.http.routers.kass-api.tls.certresolver: le
      traefik.http.services.kass-api.loadbalancer.server.port: "8000"

      # health (вне /api/v1)
      traefik.http.routers.kass-health.rule: Host(`kass.freestorms.top`) && Path(`/health`)
      traefik.http.routers.kass-health.entrypoints: websecure
      traefik.http.routers.kass-health.priority: "110"
      traefik.http.routers.kass-health.service: kass-api
      traefik.http.routers.kass-health.tls: "true"
      traefik.http.routers.kass-health.tls.certresolver: le

      # WebSocket /ws/* → backend (must not fall through to frontend catch-all)
      traefik.http.routers.kass-ws.rule: Host(`kass.freestorms.top`) && PathPrefix(`/ws`)
      traefik.http.routers.kass-ws.entrypoints: websecure
      traefik.http.routers.kass-ws.priority: "110"
      traefik.http.routers.kass-ws.service: kass-api
      traefik.http.routers.kass-ws.tls: "true"
      traefik.http.routers.kass-ws.tls.certresolver: le

    healthcheck:
      # /health is readiness; Docker healthcheck uses liveness endpoint.
      test: ["CMD", "/app/scripts/healthcheck-backend.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
      - egress
    init: true
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PROXY_CONFIG_PATH: ${PROXY_CONFIG_PATH:-/app/3proxy-cfg/3proxy.cfg}
      PROXY_BASE_PORT: ${PROXY_BASE_PORT:-10000}
      PROXY_RELOAD_CMD: ${PROXY_RELOAD_CMD:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      WAIT_FOR_DEPS: ${WAIT_FOR_DEPS:-1}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-1}
      WAIT_FOR_REDIS: ${WAIT_FOR_REDIS:-1}
      WAIT_MAX_RETRIES: ${WAIT_MAX_RETRIES:-30}
      WAIT_BACKOFF_BASE: ${WAIT_BACKOFF_BASE:-2}
      WAIT_BACKOFF_MAX: ${WAIT_BACKOFF_MAX:-20}
      MIGRATION_MAX_RETRIES: ${MIGRATION_MAX_RETRIES:-10}
      MIGRATION_BACKOFF_BASE: ${MIGRATION_BACKOFF_BASE:-2}
      MIGRATION_BACKOFF_MAX: ${MIGRATION_BACKOFF_MAX:-30}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS_WORKER:-0}
      CELERY_APP: ${CELERY_APP:-app.workers:celery_app}
      CELERY_POOL: ${CELERY_POOL:-solo}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ROLE: worker
      PRODUCTION: "true"
      ENVIRONMENT: production
    volumes:
      - 3proxy-cfg:/app/3proxy-cfg
      - pre-auth-sessions:/data/pyrogram_pre_auth
      - pyrogram-sessions:/data/pyrogram_sessions
    command: celery -A app.workers:celery_app worker --loglevel=info --hostname "celery@%h" --pool "${CELERY_POOL:-solo}" --concurrency "${CELERY_CONCURRENCY:-1}"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    depends_on:
      backend:
        # Avoid readiness deadlock: backend health depends on worker readiness.
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck-worker.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  beat:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    init: true
    stop_grace_period: 15s
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ROLE: beat
      PRODUCTION: "true"
      ENVIRONMENT: production
    command: celery -A app.workers:celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  proxy:
    build:
      context: ./proxy
    image: rovena-3proxy:local
    container_name: 3proxy
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app
    volumes:
      - 3proxy-cfg:/etc/3proxy
    command: *proxy-command
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: *proxy-healthcheck
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app
    environment:
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.docker.network: rovena_app
      traefik.http.routers.kass-web.rule: "Host(`kass.freestorms.top`)"
      traefik.http.routers.kass-web.entrypoints: websecure
      traefik.http.routers.kass-web.priority: "10"
      traefik.http.routers.kass-web.service: kass-web
      traefik.http.routers.kass-web.tls: "true"
      traefik.http.routers.kass-web.tls.certresolver: le
      traefik.http.services.kass-web.loadbalancer.server.port: "5173"

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    logging: *default-logging
    networks:
      - monitor
      - app
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_rules.yml:/etc/prometheus/prometheus_rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
      proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/ready >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:10.4.3
    restart: unless-stopped
    logging: *default-logging
    networks:
      - monitor
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.25.0
    restart: unless-stopped
    logging: *default-logging
    networks:
      - monitor
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9115/metrics >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  cron:
    build:
      context: ./cron
    restart: unless-stopped
    logging: *default-logging
    networks:
      - data
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./crontab.txt:/etc/crontabs/root:ro
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql-data:
  redis-data:
  3proxy-cfg:
  pre-auth-sessions:
  pyrogram-sessions:
  prometheus-data:
  grafana-data:
  backups:

networks:
  public:
    internal: false
  app:
    internal: true
  data:
    internal: true
  monitor:
    internal: true
  infra:
    internal: true
  egress:
    # Dedicated outbound-only network for services that need internet access
    # (e.g. worker → Telegram DC, backend → external APIs).
    # No published ports here — ingress stays on 'public' via Traefik.
    internal: false
