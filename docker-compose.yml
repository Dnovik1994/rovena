x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
    logging: *default-logging
    environment:
      MYSQL_DATABASE: rovena
      MYSQL_USER: rovena
      MYSQL_PASSWORD: rovena
      MYSQL_ROOT_PASSWORD: rovena_root
    ports:
      - "13306:3306"
    volumes:
      - postgres-data:/var/lib/mysql
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent && mysql -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD -e \"SELECT 1\" >/dev/null && count=$$(mysql -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD -Nse \"SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='mysql' AND table_name='user'\"); [ \"$$count\" -gt 0 ]",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
    logging: *default-logging
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "value=$$(date +%s); redis-cli ping | grep -q PONG && redis-cli set healthcheck:ready $$value EX 5 >/dev/null && [ \"$(redis-cli get healthcheck:ready)\" = \"$$value\" ]",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
    logging: *default-logging
    init: true
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PROXY_CONFIG_PATH: ${PROXY_CONFIG_PATH:-/app/3proxy.cfg}
      PROXY_BASE_PORT: ${PROXY_BASE_PORT:-10000}
      PROXY_RELOAD_CMD: ${PROXY_RELOAD_CMD:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-rovena}
      DB_PASSWORD: ${DB_PASSWORD:-rovena}
      DB_NAME: ${DB_NAME:-rovena}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      WAIT_FOR_DEPS: ${WAIT_FOR_DEPS:-1}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-1}
      WAIT_FOR_REDIS: ${WAIT_FOR_REDIS:-1}
      WAIT_FOR_DB_TABLES: ${WAIT_FOR_DB_TABLES:-1}
      WAIT_MAX_RETRIES: ${WAIT_MAX_RETRIES:-30}
      WAIT_BACKOFF_BASE: ${WAIT_BACKOFF_BASE:-2}
      WAIT_BACKOFF_MAX: ${WAIT_BACKOFF_MAX:-20}
      MIGRATION_MAX_RETRIES: ${MIGRATION_MAX_RETRIES:-10}
      MIGRATION_BACKOFF_BASE: ${MIGRATION_BACKOFF_BASE:-2}
      MIGRATION_BACKOFF_MAX: ${MIGRATION_BACKOFF_MAX:-30}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      APP_ROLE: backend
    ports:
      - "8020:8020"
    volumes:
      - 3proxy-cfg:/app/3proxy.cfg
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck-backend.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
    logging: *default-logging
    init: true
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PROXY_CONFIG_PATH: ${PROXY_CONFIG_PATH:-/app/3proxy.cfg}
      PROXY_BASE_PORT: ${PROXY_BASE_PORT:-10000}
      PROXY_RELOAD_CMD: ${PROXY_RELOAD_CMD:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-rovena}
      DB_PASSWORD: ${DB_PASSWORD:-rovena}
      DB_NAME: ${DB_NAME:-rovena}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      WAIT_FOR_DEPS: ${WAIT_FOR_DEPS:-1}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-1}
      WAIT_FOR_REDIS: ${WAIT_FOR_REDIS:-1}
      WAIT_FOR_DB_TABLES: ${WAIT_FOR_DB_TABLES:-1}
      WAIT_MAX_RETRIES: ${WAIT_MAX_RETRIES:-30}
      WAIT_BACKOFF_BASE: ${WAIT_BACKOFF_BASE:-2}
      WAIT_BACKOFF_MAX: ${WAIT_BACKOFF_MAX:-20}
      MIGRATION_MAX_RETRIES: ${MIGRATION_MAX_RETRIES:-10}
      MIGRATION_BACKOFF_BASE: ${MIGRATION_BACKOFF_BASE:-2}
      MIGRATION_BACKOFF_MAX: ${MIGRATION_BACKOFF_MAX:-30}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS_WORKER:-0}
      CELERY_APP: ${CELERY_APP:-app.workers}
      APP_ROLE: worker
    volumes:
      - 3proxy-cfg:/app/3proxy.cfg
    command: celery -A app.workers worker --loglevel=info
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck-worker.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  proxy:
    profiles: ["proxy"]
    image: vimagick/3proxy:latest
    container_name: 3proxy
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
    logging: *default-logging
    ports:
      - "10000-11000:10000-11000"
    volumes:
      - 3proxy-cfg:/etc/3proxy/3proxy.cfg
    command: ["/usr/local/bin/3proxy", "/etc/3proxy/3proxy.cfg"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -s /etc/3proxy/3proxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      restart_policy:
        delay: 5s
    logging: *default-logging
    environment:
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
  3proxy-cfg:
