name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.override.yml config
          docker compose -f docker-compose.prod.yml config
      - name: Ensure pinned images
        run: |
          set -euo pipefail
          if docker compose -f docker-compose.prod.yml config | grep -nE '^[[:space:]]*image:[[:space:]]*(traefik|prom/prometheus|grafana/grafana|prom/blackbox-exporter):latest[[:space:]]*$'; then
            echo "Found unpinned latest tags for monitored services."
            exit 1
          fi

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Compile backend
        run: python -m compileall backend/app
      - name: Run tests
        env:
          DATABASE_URL: sqlite+pysqlite:///./test.db
          TELEGRAM_BOT_TOKEN: test-token
        run: pytest backend/tests

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        env:
          NPM_REGISTRY: https://registry.npmjs.org/
        run: |
          npm config set registry $NPM_REGISTRY
          if [ -f frontend/package-lock.json ]; then
            cd frontend && npm ci
          else
            cd frontend && npm install
          fi
      - name: Build frontend
        run: cd frontend && npm run build

  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - name: Deploy placeholder
        run: echo "Manual deploy triggered. Configure deploy.yml for production releases."
