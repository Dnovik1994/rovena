name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          set -euo pipefail
          cp .env.example .env
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.override.yml config --quiet
          docker compose -f docker-compose.prod.yml config > /tmp/compose-prod.yml
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          try:
              import yaml  # type: ignore
          except ModuleNotFoundError:  # pragma: no cover
              subprocess.check_call([sys.executable, "-m", "pip", "install", "--quiet", "pyyaml"])
              import yaml  # type: ignore

          config_text = Path("/tmp/compose-prod.yml").read_text()
          config = yaml.safe_load(config_text) or {}
          errors = []
          for name, service in config.get("services", {}).items():
              if service.get("privileged") is True:
                  errors.append(f"{name} uses privileged: true")
              networks = service.get("networks") or {}
              if isinstance(networks, list):
                  networks = {network: {} for network in networks}
              if name in {"db", "redis"} and "public" in networks:
                  errors.append(f"{name} is attached to public network")
              for volume in service.get("volumes", []) or []:
                  source = None
                  read_only = False
                  if isinstance(volume, str):
                      parts = volume.split(":")
                      if len(parts) >= 2:
                          source = parts[0]
                          read_only = "ro" in parts[2:]
                  elif isinstance(volume, dict):
                      source = volume.get("source")
                      read_only = volume.get("read_only") is True or volume.get("mode") == "ro"
                  if source == "/var/run/docker.sock":
                      if name != "docker-socket-proxy":
                          errors.append(f"{name} mounts docker.sock")
                      if not read_only:
                          errors.append("docker-socket-proxy docker.sock mount is not read-only")
          if errors:
              print("Invalid docker.sock/privileged configuration:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)
          PY
      - name: Ensure pinned images
        run: |
          set -euo pipefail
          if docker compose -f docker-compose.prod.yml config | grep -nE '^[[:space:]]*image:[[:space:]]*(traefik|prom/prometheus|grafana/grafana|prom/blackbox-exporter):latest[[:space:]]*$'; then
            echo "Found unpinned latest tags for monitored services."
            exit 1
          fi

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt || {
            echo "::warning::pyaes build failed; installing pyrogram without transitive deps"
            grep -v '^pyrogram' backend/requirements.txt > /tmp/requirements-nopyro.txt
            pip install -r /tmp/requirements-nopyro.txt -r backend/requirements-dev.txt
            pip install --no-deps pyrogram==2.0.106
          }
      - name: Compile backend
        run: python -m compileall backend/app
      - name: Run tests
        env:
          DATABASE_URL: sqlite+pysqlite:///./test.db
          TELEGRAM_BOT_TOKEN: test-token
        run: pytest backend/tests

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        env:
          NPM_REGISTRY: https://registry.npmjs.org/
        run: |
          npm config set registry $NPM_REGISTRY
          if [ -f frontend/package-lock.json ]; then
            cd frontend && npm ci
          else
            cd frontend && npm install
          fi
      - name: Build frontend
        run: cd frontend && npm run build

  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - name: Deploy placeholder
        run: echo "Manual deploy triggered. Configure deploy.yml for production releases."
