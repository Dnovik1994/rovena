name: Deploy

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/rovena/backend:${{ github.ref_name }} ./backend
          docker push ${{ secrets.REGISTRY_URL }}/rovena/backend:${{ github.ref_name }}
      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/rovena/frontend:${{ github.ref_name }} ./frontend
          docker push ${{ secrets.REGISTRY_URL }}/rovena/frontend:${{ github.ref_name }}

  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/rovena
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
      - name: Smoke test
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://kass.freestorms.top/health || true)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: health endpoint returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"
