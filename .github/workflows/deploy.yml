name: Deploy

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/rovena/backend:${{ github.ref_name }} ./backend
          docker push ${{ secrets.REGISTRY_URL }}/rovena/backend:${{ github.ref_name }}
      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/rovena/frontend:${{ github.ref_name }} ./frontend
          docker push ${{ secrets.REGISTRY_URL }}/rovena/frontend:${{ github.ref_name }}

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/rovena
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
