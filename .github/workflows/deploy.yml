name: Deploy

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/rovena/backend:${{ github.ref_name }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/rovena/frontend:${{ github.ref_name }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/rovena
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
      - name: Smoke test
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://kass.freestorms.top/health || true)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: health endpoint returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"
      - name: Notify on failure
        if: failure()
        run: |
          echo "## :x: Deploy failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release:** ${{ github.event.release.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
